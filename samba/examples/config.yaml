auth:
  - user: ludelafo
    group: users
    uid: 1001
    gid: 100
    password_file: /run/secrets/ludelafo_password.txt

  - user: heaspery
    group: users
    uid: 1002
    gid: 100
    password_file: /run/secrets/heaspery_password.txt

global:
  - "access based share enum = yes"

share:
  - name: public
    comment: Public
    path: /shares/public
    writelist: ludelafo,heaspery
    browsable: yes
    readonly: yes
    guestok: yes
    veto: no
    # Uncomment this line to enable recycle bin
    # recycle: yes

  - name: private
    comment: Private
    path: /shares/private
    writelist: ludelafo,heaspery
    browsable: yes
    readonly: no
    guestok: no
    veto: no
    # Uncomment this line to enable recycle bin
    # recycle: yes
