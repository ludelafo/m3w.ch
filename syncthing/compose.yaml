name: Syncthing

services:
  syncthing:
    container_name: ${SYNCTHING_CONTAINER_NAME}
    hostname: ${SYNCTHING_CONTAINER_NAME}
    image: syncthing/syncthing:${SYNCTHING_IMAGE_VERSION}
    restart: unless-stopped
    env_file:
      - syncthing.env
    ports:
      - 8384:8384
      - 22000:22000
      - 22000:22000/udp
      - 21027:21027/udp
    volumes:
      - ./config:/var/syncthing
      - ./data:/data
    healthcheck:
      test:
        curl --fail --location --show-error --max-time 2 --output /dev/null --write-out "%{http_code}\n" --silent 127.0.0.1:8384/rest/noauth/health |
        grep -q 200 ||
        exit 1
      interval: 1m
      timeout: 10s
      retries: 3
