global:
  sendAnonymousUsage: true

log:
  level: INFO

api:
  dashboard: true

ping: {}

providers:
  docker:
    exposedByDefault: false
    network: traefik_network
  file:
    filename: /etc/traefik/traefik_dynamic.yaml
    watch: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      middlewares:
        - http-strict-transport-security-header@file
      tls:
        certResolver: letsencrypt
        domains:
          - main: "m3w.ch"
            sans:
              - "*.m3w.ch"
              - "*.ludelafo.m3w.ch"
              - "*.heaspery.m3w.ch"

  minecraft:
    address: ":25565"

certificatesResolvers:
  letsencrypt:
    acme:
      email: notifications@m3w.ch
      storage: /var/lib/traefik/acme.json
      dnsChallenge:
        # https://doc.traefik.io/traefik/reference/install-configuration/tls/certificate-resolvers/acme/#dnschallenge
        provider: infomaniak
        propagation:
          delayBeforeChecks: 30s
