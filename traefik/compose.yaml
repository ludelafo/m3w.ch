name: Traefik

networks:
  traefik_network:
    name: traefik_network

secrets:
  infomaniak_access_token:
    file: .secrets/infomaniak_access_token.txt

  traefik_acme_file:
    file: .secrets/acme.json

services:
  traefik:
    container_name: ${TRAEFIK_CONTAINER_NAME}
    hostname: ${TRAEFIK_CONTAINER_NAME}
    image: traefik:${TRAEFIK_IMAGE_VERSION}
    command:
      - --configFile=/etc/traefik/traefik_static.yaml
    restart: unless-stopped
    environment:
      - INFOMANIAK_ACCESS_TOKEN_FILE=/run/secrets/infomaniak_access_token
    networks:
      - traefik_network
    ports:
      - 80:80
      - 443:443
      - 25565:25565
    secrets:
      - infomaniak_access_token
      - traefik_acme_file
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik_static.yaml:/etc/traefik/traefik_static.yaml:ro
      - ./traefik_dynamic.yaml:/etc/traefik/traefik_dynamic.yaml:ro
    labels:
      ## Traefik
      - traefik.enable=true
      # Router
      - traefik.http.routers.${TRAEFIK_CONTAINER_NAME}.entryPoints=websecure
      - traefik.http.routers.${TRAEFIK_CONTAINER_NAME}.rule=Host(`${TRAEFIK_FQDN}`)
      # Service
      - traefik.http.routers.${TRAEFIK_CONTAINER_NAME}.service=api@internal
      ## Glance
      - glance.name=Traefik
      # https://github.com/glanceapp/glance/blob/main/docs/configuration.md#icons
      - glance.icon=sh:traefik
      - glance.url=https://${TRAEFIK_FQDN}
      - glance.description=Modern reverse proxy and load balancer.
      - glance.category=infrastructure
