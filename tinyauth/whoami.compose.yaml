networks:
  traefik_network:
    external: true

services:
  whoami:
    image: traefik/whoami:latest
    restart: unless-stopped
    networks:
      - traefik_network
    labels:
      traefik.enable: true
      traefik.http.routers.whoami.rule: Host(`whoami2.m3w.ch`)
      traefik.http.routers.whoami.middlewares: tinyauth
      tinyauth.apps.whoami.config.domain: whoami2.m3w.ch
