networks:
  traefik_network:
    external: true

services:
  qbittorrent:
    networks:
      - traefik_network
    expose:
      - 8080
    ports: !override
      - 52570:52570
      - 52570:52570/udp
    labels:
      ## Traefik
      - traefik.enable=true
      # Middleware - https://github.com/qbittorrent/qBittorrent/wiki/Traefik-Reverse-Proxy-for-Web-UI
      - traefik.http.middlewares.qbittorrent-headers.headers.customrequestheaders.X-Frame-Options=SAMEORIGIN"
      - traefik.http.middlewares.qbittorrent-headers.headers.customrequestheaders.Referer="
      - traefik.http.middlewares.qbittorrent-headers.headers.customrequestheaders.Origin="
      # Router
      - traefik.http.routers.${QBITTORRENT_CONTAINER_NAME}.entryPoints=websecure
      - traefik.http.routers.${QBITTORRENT_CONTAINER_NAME}.rule=Host(`${QBITTORRENT_FQDN}`)
      # Service
      - traefik.http.services.${QBITTORRENT_CONTAINER_NAME}.loadbalancer.server.port=8080
      - traefik.http.services.${QBITTORRENT_CONTAINER_NAME}.loadbalancer.passhostheader=false
      ## Glance
      - glance.name=qBittorrent
      # https://github.com/glanceapp/glance/blob/main/docs/configuration.md#icons
      - glance.icon=sh:qbittorrent
      - glance.url=https://${QBITTORRENT_FQDN}
      - glance.description=BitTorrent client.
      - glance.category=media
      ## Pocket ID
      - traefik.http.routers.${QBITTORRENT_CONTAINER_NAME}.middlewares=oidc-auth@file,qbittorrent-headers@docker
