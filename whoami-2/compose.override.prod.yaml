networks:
  traefik_network:
    external: true

services:
  whoami-2:
    networks:
      - traefik_network
    expose:
      - 80
    ports: !reset []
    labels:
      ## Traefik
      - traefik.enable=true
      # Router
      - traefik.http.routers.${WHOAMI_2_CONTAINER_NAME}.entryPoints=websecure
      - traefik.http.routers.${WHOAMI_2_CONTAINER_NAME}.rule=Host(`${WHOAMI_2_FQDN}`)
      # Service
      - traefik.http.services.${WHOAMI_2_CONTAINER_NAME}.loadbalancer.server.port=80
      ## Glance
      - glance.name=whoami-2
      # https://github.com/glanceapp/glance/blob/main/docs/configuration.md#icons
      - glance.icon=sh:whoami-2
      - glance.url=https://${WHOAMI_2_FQDN}
      - glance.description=Print OS information and HTTP request to output.
      - glance.category=infrastructure
      ## Pocket ID
      - traefik.http.routers.${WHOAMI_2_CONTAINER_NAME}.middlewares=oidc-auth
      # - traefik.http.middlewares.oidc-auth.plugin.traefik-oidc-auth.authorization.assertClaims[0].name=preferred_username
      # - traefik.http.middlewares.oidc-auth.plugin.traefik-oidc-auth.authorization.assertClaims[0].anyOf=ludelafo
