networks:
  traefik_network:
    external: true

services:
  beszel:
    networks:
      - traefik_network
    expose:
      - 8090
    ports: !reset []
    volumes:
      - ./extra_filesystems/nvme0/.beszel:/extra-filesystems/nvme0:ro
      - ./extra_filesystems/sda/.beszel:/extra-filesystems/sda:ro
    devices:
      - /dev/nvme0
      - /dev/sda
    labels:
      ## Traefik
      - traefik.enable=true
      # Router
      - traefik.http.routers.${BESZEL_CONTAINER_NAME}.entryPoints=websecure
      - traefik.http.routers.${BESZEL_CONTAINER_NAME}.rule=Host(`${BESZEL_FQDN}`)
      # Service
      - traefik.http.services.${BESZEL_CONTAINER_NAME}.loadbalancer.server.port=8090
      ## Glance
      - glance.name=Beszel
      # https://github.com/glanceapp/glance/blob/main/docs/configuration.md#icons
      - glance.icon=sh:beszel
      - glance.url=https://${BESZEL_FQDN}
      - glance.description=Simple, lightweight server monitoring.
      - glance.category=infrastructure
