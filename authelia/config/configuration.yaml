## Authentication Backend
# https://www.authelia.com/configuration/first-factor/introduction/
# https://www.authelia.com/configuration/first-factor/ldap/
# https://www.authelia.com/integration/ldap/lldap/
authentication_backend:
  refresh_interval: "5m"
  password_reset:
    disable: false
  ldap:
    address: "ldap://lldap:3890"
    implementation: "lldap"
    base_dn: "dc=m3w,dc=ch"
    additional_users_dn: "OU=users"
    users_filter: "(&(|({username_attribute}={input})({mail_attribute}={input}))(objectClass=person))"
    additional_groups_dn: "OU=groups"
    groups_filter: "(&(member={dn})(objectClass=groupOfNames))"
    user: "UID=authelia,OU=people,DC=m3w,DC=ch"

## TOTP
# https://www.authelia.com/configuration/second-factor/time-based-one-time-password/
# https://www.authelia.com/reference/integrations/time-based-one-time-password-apps/
totp:
  disable: false
  issuer: "authelia.m3w.ch"

## Access Control
# https://www.authelia.com/configuration/security/access-control/
access_control:
  default_policy: "deny"
  rules:
    - domain: "*.m3w.ch"
      policy: "two_factor"

## Regulation
# https://www.authelia.com/configuration/security/regulation/
regulation:
  modes:
    - "user"
    # - 'ip'
  max_retries: 3
  find_time: "2 minutes"
  ban_time: "5 minutes"

## Password policy
# https://www.authelia.com/configuration/security/password-policy/
password_policy:
  standard:
    enabled: true
    min_length: 12

## Identity Validation
# https://www.authelia.com/configuration/identity-validation/introduction/
# https://www.authelia.com/configuration/identity-validation/reset-password/
# https://www.authelia.com/configuration/identity-validation/elevated-session/
identity_validation:
  elevated_session:
    code_lifespan: "5 minutes"
    elevation_lifespan: "10 minutes"
    characters: 12

## https://www.authelia.com/configuration/session/introduction/
session:
  name: "authelia_session"
  same_site: "lax"
  inactivity: "5 minutes"
  expiration: "1 hour"
  remember_me: "1 month"
  cookies:
    - domain: "m3w.ch"
      authelia_url: "https://authelia.m3w.ch"
      default_redirection_url: "https://www.m3w.ch"

## Storage
# https://www.authelia.com/configuration/storage/introduction/
# https://www.authelia.com/configuration/storage/sqlite/
storage:
  local:
    path: "/config/db.sqlite3"

## Notifications
# https://www.authelia.com/configuration/notifications/introduction/
# https://www.authelia.com/configuration/notifications/file/
notifier:
  filesystem:
    filename: "/config/notification.txt"

## Server
# https://www.authelia.com/configuration/miscellaneous/server/
server:
  address: "tcp://:9091"

## Log
# https://www.authelia.com/configuration/miscellaneous/logging/
log:
  level: "info"
