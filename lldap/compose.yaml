name: LLDAP

networks:
  lldap_network:
    name: lldap_network

secrets:
  jwt_secret.txt:
    file: ./data/jwt_secret.txt

  key_seed.txt:
    file: ./data/key_seed.txt

  ldap_user_pass.txt:
    file: ./data/ldap_user_pass.txt

services:
  lldap:
    container_name: ${LLDAP_CONTAINER_NAME}
    hostname: ${LLDAP_CONTAINER_NAME}
    image: lldap/lldap:${LLDAP_IMAGE_VERSION}
    restart: unless-stopped
    env_file:
      - lldap.env
    environment:
      - LLDAP_HTTP_URL=https://${LLDAP_FQDN}
      - LLDAP_JWT_SECRET_FILE=/run/secrets/jwt_secret.txt
      - LLDAP_KEY_SEED_FILE=/run/secrets/key_seed.txt
      - LLDAP_LDAP_USER_PASS_FILE=/run/secrets/ldap_user_pass.txt
    networks:
      - lldap_network
    ports:
      - 17170:17170
    secrets:
      - jwt_secret.txt
      - key_seed.txt
      - ldap_user_pass.txt
    volumes:
      - ./data:/data
