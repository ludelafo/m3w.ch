networks:
  traefik_network:
    external: true

services:
  lldap:
    networks:
      - traefik_network
    expose:
      - 17170
    labels:
      ## Glance
      - glance.name=LLDAP
      # https://github.com/glanceapp/glance/blob/main/docs/configuration.md#icons
      - glance.icon=sh:lldap
      - glance.url=https://${LLDAP_FQDN}
      - glance.description= Light LDAP implementation.
      - glance.category=infrastructure
