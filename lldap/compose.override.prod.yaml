networks:
  traefik_network:
    external: true

services:
  lldap:
    networks:
      - traefik_network
    expose:
      - 17170
    ports: !reset []
    labels:
      ## Traefik
      - traefik.enable=true
      # Router
      - traefik.http.routers.${LLDAP_CONTAINER_NAME}.entryPoints=websecure
      - traefik.http.routers.${LLDAP_CONTAINER_NAME}.rule=Host(`${LLDAP_FQDN}`)
      # Service
      - traefik.http.services.${LLDAP_CONTAINER_NAME}.loadbalancer.server.port=17170
      ## Glance
      - glance.name=LLDAP
      # https://github.com/glanceapp/glance/blob/main/docs/configuration.md#icons
      - glance.icon=sh:lldap
      - glance.url=https://${LLDAP_FQDN}
      - glance.description= Light LDAP implementation.
      - glance.category=infrastructure
