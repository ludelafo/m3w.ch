networks:
  traefik_network:
    external: true

services:
  scrutiny:
    networks:
      - traefik_network
    expose:
      - 8080
    ports: !reset []
    labels:
      ## Traefik
      - traefik.enable=true
      # Router
      - traefik.http.routers.${SCRUTINY_CONTAINER_NAME}.entryPoints=websecure
      - traefik.http.routers.${SCRUTINY_CONTAINER_NAME}.rule=Host(`${SCRUTINY_FQDN}`)
      # Service
      - traefik.http.services.${SCRUTINY_CONTAINER_NAME}.loadbalancer.server.port=8080
      ## Glance
      - glance.name=Scrutiny
      # https://github.com/glanceapp/glance/blob/main/docs/configuration.md#icons
      - glance.icon=sh:scrutiny
      - glance.url=https://${SCRUTINY_FQDN}
      - glance.description=Hard Drive S.M.A.R.T Monitoring.
      - glance.category=infrastructure
