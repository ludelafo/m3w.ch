services:
  whoami:
    labels:
      ## Glance
      - glance.name=whoami
      # https://github.com/glanceapp/glance/blob/main/docs/configuration.md#icons
      - glance.icon=sh:whoami
      - glance.url=https://${WHOAMI_FQDN}
      - glance.description=Print OS information and HTTP request to output.
      - glance.category=infrastructure
      ## Tinyauth
      - traefik.http.routers.${WHOAMI_CONTAINER_NAME}.middlewares=tinyauth
      - tinyauth.apps.${WHOAMI_CONTAINER_NAME}.config.domain=${WHOAMI_FQDN}
      - tinyauth.apps.${WHOAMI_CONTAINER_NAME}.ldap.groups=ludelafo
