networks:
  traefik_network:
    external: true

services:
  whoami:
    networks:
      - traefik_network
    expose:
      - 80
    ports: !reset []
    labels:
      ## Traefik
      - traefik.enable=true
      # Router
      - traefik.http.routers.${WHOAMI_CONTAINER_NAME}.entryPoints=websecure
      - traefik.http.routers.${WHOAMI_CONTAINER_NAME}.rule=Host(`${WHOAMI_FQDN}`)
      # Service
      - traefik.http.services.${WHOAMI_CONTAINER_NAME}.loadbalancer.server.port=80
      ## Glance
      - glance.name=whoami
      # https://github.com/glanceapp/glance/blob/main/docs/configuration.md#icons
      - glance.icon=sh:whoami
      - glance.url=https://${WHOAMI_FQDN}
      - glance.description=Print OS information and HTTP request to output.
      - glance.category=infrastructure
      ## Authelia
      - traefik.http.routers.${WHOAMI_CONTAINER_NAME}.middlewares=oidc-auth@file
