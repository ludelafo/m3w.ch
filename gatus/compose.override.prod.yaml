networks:
  traefik_network:
    external: true

services:
  gatus:
    networks:
      - traefik_network
    expose:
      - 8080
    ports: !reset []
    labels:
      ## Traefik
      - traefik.enable=true
      # Router
      - traefik.http.routers.${GATUS_CONTAINER_NAME}.entryPoints=websecure
      - traefik.http.routers.${GATUS_CONTAINER_NAME}.rule=Host(`${GATUS_FQDN}`)
      # Service
      - traefik.http.services.${GATUS_CONTAINER_NAME}.loadbalancer.server.port=8080
      ## Glance
      - glance.name=Gatus
      # https://github.com/glanceapp/glance/blob/main/docs/configuration.md#icons
      - glance.icon=sh:gatus
      - glance.url=https://${GATUS_FQDN}
      - glance.description=Service monitoring tool.
      - glance.category=infrastructure
